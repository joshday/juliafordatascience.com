project:
  type: website

engines: ["julia"]

website:
  title: "Julia for Data Science"
  site-url: https://juliafordatascience.com
  draft-mode: visible
  search:
    type: textbox
  navbar:
    background: "#9558B2"
    left: []
    tools:
      - icon: rss
        href: /index.xml
      - icon: github
        href: https://github.com/joshday/juliafordatascience.com
      - icon: twitter
        href: https://twitter.com/JuliaForDataSci


format:
  html:
    code-copy: true
    mainfont: Inter
    lang: en
    code-line-numbers: true
    resources:
      - "assets/"
      - "CNAME"
    theme: flatly
    css:
      - https://rsms.me/inter/inter.css
      # - https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css
      - assets/custom.css
    toc: true
    html-math-method: katex
    include-after-body: assets/html/post-meta-footer.html
